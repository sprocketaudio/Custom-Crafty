<div class="form-group">
    <label for="server_jar">{{ translate('serverWizard', 'serverType', data['lang']) }}</label>
    <div class="input-group">
        <select required class="form-control form-control-lg select-css" id="server_jar" name="type"
            onchange="serverJarChange(this)">
            <option value="">{{ translate('serverWizard', 'selectServer', data['lang']) }}</option>
            {% for s in data['server_types'] %}
            {% if data['server_types'][s].get("enabled", False) %}
            <option value="{{ s }}">{{ data["server_types"][s].get("friendly_name", s).capitalize() }}
                {% end %}
            </option>
            {% end %}
        </select>
        {% if data['super_user'] %}
        <div class="input-group-append">
            <button class="btn custom-picker" type="button" onclick="refreshCache()"><i id="refresh-cache"
                    class="refresh-class ph ph-arrows-clockwise"></i></button>
        </div>
        {% end %}
    </div>
</div>

<div class="form-group">
    <label for="server_type">{{ translate('serverWizard', 'serverSelect', data['lang']) }}</label>
    <select required class="form-control form-control-lg select-css" id="server_type" name="type"
        onchange="serverTypeChange(this)">
        <option value="">{{ translate('serverWizard', 'selectServer', data['lang']) }}</option>
    </select>
</div>

<div class="form-group">
    <label for="server_version">Minecraft / Base Version</label>
    <select required class="form-control form-control-lg select-css" id="server" name="mc_version"
        onchange="serverVersionChange(this)">
        <option value="">{{ translate('serverWizard', 'selectVersion', data['lang']) }}</option>
    </select>
</div>

<div class="form-group">
    <label for="server_build">Executable Build Version</label>
    <select required class="form-control form-control-lg select-css" id="server_build" name="version">
        <option value="">{{ translate('serverWizard', 'selectVersion', data['lang']) }}</option>
    </select>
</div>

<span data-html="true" class="version-hint text-center"
    data-content="Unsupported legacy version selected." data-placement="right"></span>

<script type="text/javascript">
    const text = '{% raw data["js_server_types"] %}';
    const serverTypesLists = JSON.parse(text);
    let updateCenterBuildMap = {};

    function deriveBaseVersion(versionKey) {
        const raw = String(versionKey || "").trim();
        const match = raw.match(/^(\d+\.\d+(?:\.\d+)?)/);
        return match ? match[1] : raw;
    }

    function setBuildOptions(entries, preferredValue = "") {
        const cSelect = document.getElementById("server_build");
        while (cSelect.options.length > 0) {
            cSelect.remove(0);
        }
        if (!entries || !entries.length) {
            return;
        }
        entries.forEach((entry) => {
            const opt = document.createElement("option");
            opt.value = entry.versionKey;
            opt.text = entry.label;
            try {
                cSelect.add(opt);
            } catch (e) {
                cSelect.appendChild(opt);
            }
        });
        if (preferredValue) {
            const matching = entries.find((entry) => entry.versionKey === preferredValue);
            if (matching) {
                cSelect.value = preferredValue;
            }
        }
    }

    function populateBuildsForBase(baseVersion, preferredValue = "") {
        if (!baseVersion || !updateCenterBuildMap[baseVersion]) {
            setBuildOptions([]);
            return;
        }
        setBuildOptions(updateCenterBuildMap[baseVersion], preferredValue);
    }

    async function fetchRemoteBuildOptions(category, jarType, baseVersion) {
        const token = getCookie("_xsrf");
        const params = new URLSearchParams({
            category: category,
            type: jarType,
            mc_version: baseVersion,
        });
        const res = await fetch(
            `/api/v2/servers/${serverId}/update/config/?${params.toString()}`,
            {
                method: "GET",
                headers: {
                    "X-XSRFToken": token,
                },
            }
        );
        const responseData = await res.json();
        if (responseData.status !== "ok") {
            throw new Error(responseData.error_data || responseData.error || "Failed to load build versions.");
        }
        const build_versions = (responseData.data && responseData.data.build_versions) || [];
        return build_versions.map((entry) => ({
            versionKey: entry.value,
            label: entry.label || entry.value,
        }));
    }

    function serverTypeChange(selectObj) {
        const idx = document.getElementById("server_type").value;
        const idx_list = idx.split("|");
        const baseSelect = document.getElementById("server");
        const buildSelect = document.getElementById("server_build");
        let versions = {};

        try {
            versions = serverTypesLists[idx_list[0]]["types"][idx_list[1]]["versions"];
        } catch {
            while (baseSelect.options.length > 0) {
                baseSelect.remove(0);
            }
            while (buildSelect.options.length > 0) {
                buildSelect.remove(0);
            }
            return;
        }

        $("#server option").each(function () {
            $(this).remove();
        });
        $("#server_build option").each(function () {
            $(this).remove();
        });

        updateCenterBuildMap = {};
        Object.keys(versions).forEach((versionKey) => {
            const meta = versions[versionKey] || {};
            const baseVersion = deriveBaseVersion(versionKey);
            if (!updateCenterBuildMap[baseVersion]) {
                updateCenterBuildMap[baseVersion] = [];
            }
            const loaderVersion = String(meta.loader_version || "").trim();
            const display = loaderVersion
                ? `${loaderVersion} (${versionKey})`
                : versionKey;
            updateCenterBuildMap[baseVersion].push({
                versionKey: versionKey,
                label: display,
            });
        });

        Object.keys(updateCenterBuildMap).forEach((baseVersion) => {
            const newOption = document.createElement("option");
            newOption.value = baseVersion;
            newOption.text = baseVersion;
            try {
                baseSelect.add(newOption);
            } catch (e) {
                baseSelect.appendChild(newOption);
            }
        });

        if (baseSelect.options.length > 0) {
            serverVersionChange();
        }
    }

    async function serverVersionChange(selectObj) {
        const baseVersion = document.getElementById("server").value;
        populateBuildsForBase(baseVersion);

        const selectedTypeValue = document.getElementById("server_type").value || "";
        const parts = selectedTypeValue.split("|");
        if (parts.length !== 2) {
            return;
        }
        const category = parts[0];
        const jarType = parts[1];
        if (!category || !jarType || !baseVersion) {
            return;
        }
        if (typeof serverId === "undefined" || !serverId) {
            return;
        }

        try {
            const remoteEntries = await fetchRemoteBuildOptions(category, jarType, baseVersion);
            if (remoteEntries.length > 0) {
                const current = document.getElementById("server_build").value || "";
                setBuildOptions(remoteEntries, current);
            }
        } catch (err) {
            console.warn("Unable to load remote build versions:", err);
        }
    }

    $("#server").change(function () {
        const selected_version = $("#server :selected").text().split(".");
        if (Number(selected_version[0]) === 1 && Number(selected_version[1]) < 8) {
            $('[data-toggle="popover"]').popover();
            if ($(globalThis).width() < 1000) {
                $(".version-hint").attr("data-placement", "top");
            } else {
                $(".version-hint").attr("data-placement", "right");
            }
            $(".version-hint").popover("show");
        } else {
            $(".version-hint").popover("hide");
        }
    });

    function serverJarChange(selectObj) {
        const type_select = document.getElementById("server_jar");
        const tidx = type_select.selectedIndex;
        const val = type_select.options[tidx].value;

        if (!val) {
            $("#server_type option").each(function () {
                $(this).remove();
            });
            $("#server option").each(function () {
                $(this).remove();
            });
            $("#server_build option").each(function () {
                $(this).remove();
            });
            return;
        }

        let jcSelect = {};
        if (val == "None") {
            jcSelect = document.getElementById("server_type");
            while (jcSelect.options.length > 0) {
                jcSelect.remove(0);
            }
            serverTypeChange(selectObj);
            return;
        }

        const jidx = selectObj.selectedIndex;
        const jwhich = selectObj.options[jidx].value;
        const jcList = Object.keys(serverTypesLists[jwhich]["types"]);
        jcSelect = document.getElementById("server_type");
        while (jcSelect.options.length > 0) {
            jcSelect.remove(0);
        }
        jcList.forEach((type) => {
            const jnewOption = document.createElement("option");
            jnewOption.value = jwhich + "|" + type;
            jnewOption.text = type;
            try {
                jcSelect.add(jnewOption);
            } catch (e) {
                jcSelect.appendChild(jnewOption);
            }
        });
        serverTypeChange(selectObj);
    }

    async function refreshCache() {
        document.getElementById("refresh-cache").classList.add("ph-spin");
        const token = getCookie("_xsrf");
        const res = await fetch(`/api/v2/crafty/JarCache`, {
            method: "GET",
            headers: {
                "X-XSRFToken": token,
            },
        });
        const responseData = await res.json();
        if (responseData.status === "ok") {
            document.getElementById("refresh-cache").classList.remove("ph-arrows-clockwise");
            document.getElementById("refresh-cache").classList.remove("ph-spin");
            document.getElementById("refresh-cache").classList.add("ph-check-fat");
            setTimeout(() => {
                location.reload();
            }, 2000);
        } else {
            bootbox.alert({
                title: responseData.error,
                message: responseData.error_data,
            });
        }
    }
</script>
